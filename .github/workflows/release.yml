name: release

on:
  workflow_dispatch: # manual trigger
  workflow_call: # called by pre-release when no PR is created
    inputs:
      called-from-pre-release:
        type: boolean
        default: true
  pull_request_target: # called by a PR to main branch created by pre-release
    branches: [main]
    types: [closed]

jobs:
  create: # the if handles a few different options based on how the workflow is triggered
    if: >-
      github.event_name == 'workflow_dispatch' ||
      inputs.called-from-pre-release == true ||
      (startsWith(github.head_ref, 'pre-release-') && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install setuptools_scm
        run: pip install "setuptools_scm<7"

      - name: Show current version
        run: python .ci-helpers/get_current_version.py

      - name: Get next version
        run: |
          python .ci-helpers/get_next_version.py
          echo "NEW_TAG=$(python .ci-helpers/get_next_version.py)" >> $GITHUB_ENV

      - name: Initialize release
        uses: softprops/action-gh-release@v2
        with:
          name: TARDIS v${{ env.NEW_TAG }}
          tag_name: release-${{ env.NEW_TAG }}
          token: ${{ secrets.BOT_TOKEN }}
          body: "This release has been created automatically by the TARDIS continuous delivery pipeline."
          draft: false # cannot be draft or Zenodod will not trigger

      - name: Wait for Zenodo to update the latest release
        run: sleep 120

      - name: Fetch Latest DOI from Zenodo
        id: fetch-doi
        run: | # replace the CONCEPT_DOI value with your own Zenodo concept DOI
          CONCEPT_DOI="XXXXXX"
          # Make the API request for BibTeX format, following redirects
          response=$(curl -s -L -H "Accept: application/x-bibtex" "https://zenodo.org/api/records/${CONCEPT_DOI}")

          # Extract the full DOI value correctly
          doi=$(echo "$response" | grep -oP 'doi\s*=\s*{([^}]+)}' | grep -oP '\{([^}]+)\}' | sed 's/[{}]//g')

          # Extract the DOI URL directly from the response
          url=$(echo "$response" | grep -oP 'url\s*=\s*{([^}]+)}' | grep -oP '\{([^}]+)\}' | sed 's/[{}]//g')

          echo "Extracted DOI: ${doi}"
          echo "Extracted URL: ${url}"
          # Create DOI badge using the full DOI value
          doi_badge="[![DOI Badge](https://img.shields.io/badge/DOI-${doi}-blue)](${url})"

          # Store results in GitHub environment variables
          echo "doi_badge=${doi_badge}" >> $GITHUB_ENV
          echo "doi_url=${url}" >> $GITHUB_ENV

      - name: Update release with DOI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ env.NEW_TAG }}
          token: ${{ secrets.BOT_TOKEN }}
          body: | # edit the repository link to the changelog file
            This release has been created automatically by the continuous delivery pipeline.
            ${{ env.doi_badge }}

          files:
            | # add whatever additional files are useful to include in a release
            useful-file.md
          fail_on_unmatched_files: false
          draft: false
